<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Календарь</title>
</head>
<body>
<div class="container">

    <div class="header">
        <a th:href="@{/calendar(year=${month == 1 ? year-1 : year}, month=${month == 1 ? 12 : month-1})}">Назад</a>
        <span th:text="${month} + ' / ' + ${year}"></span>
        <a th:href="@{/calendar(year=${month == 12 ? year+1 : year}, month=${month == 12 ? 1 : month+1})}">Вперед</a>
    </div>

    <div class="grid" id="calendarGrid">
        <div class="day-header">Пн</div>
        <div class="day-header">Вт</div>
        <div class="day-header">Ср</div>
        <div class="day-header">Чт</div>
        <div class="day-header">Пт</div>
        <div class="day-header">Сб</div>
        <div class="day-header">Вс</div>
    </div>
    <br>
    <a href="/home">На главную</a>
</div>

<script th:inline="javascript">
    const year = [[${year}]];
    const month = [[${month}]];
    const today = new Date();
    const canEdit = [[${canEdit}]]; // Получаем true/false из Java
    // Получаем список событий из модели
    const events = /*[[${events}]]*/ [];

    const grid = document.getElementById('calendarGrid');
    // Вычисляем смещение, чтобы календарь начинался с нужного дня недели
    const firstDay = new Date(year, month - 1, 1).getDay();
    const offset = (firstDay === 0) ? 6 : firstDay - 1;

    for (let i = 0; i < offset; i++) {
        const emptyDiv = document.createElement('div');
        emptyDiv.className = 'day empty';
        grid.appendChild(emptyDiv);
    }

    const daysInMonth = new Date(year, month, 0).getDate();
    for (let i = 1; i <= daysInMonth; i++) {
        const div = document.createElement('div');
        div.className = 'day';
        div.innerHTML = `<strong>${i}</strong>`; // День месяца

        // Ищем события для этого конкретного дня
        const currentDate = `${year}-${String(month).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        const dayEvents = events.filter(e => e.eventDate === currentDate);

        // Отрисовываем события внутри ячейки
        dayEvents.forEach(e => {
            // Достаем токены безопасности из мета-тегов
            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
            // Используем относительный путь, который Spring точно поймет
            const deleteUrl = 'admin/events/delete/' + e.id;
            const canEdit = [[${canEdit}]];

            div.innerHTML += `<div class="event-item"><span>${e.title}</span>`;

            // Кнопка добавляется только если canEdit == true
            if (canEdit) {
                div.innerHTML += `
            <form action="${deleteUrl}" method="post" style="display:inline;">
                <input type="hidden" name="_csrf" value="${csrfToken}">
                <button type="submit" style="color:red; cursor:pointer;">x</button>
            </form>`;
            }
            div.innerHTML += `</div>`;
        });

        if (i === today.getDate() && month === today.getMonth() + 1 && year === today.getFullYear()) {
            div.classList.add('today');
        }
        grid.appendChild(div);
    }
</script>

</body>
</html>
