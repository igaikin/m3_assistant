# \u0418\u043C\u044F \u043D\u0430\u0448\u0435\u0433\u043E Spring Boot \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u044F
spring.application.name=m3_assistant
# \u0421\u0442\u0440\u043E\u043A\u0430 \u043F\u043E\u0434\u043A\u043B\u044E\u0447\u0435\u043D\u0438\u044F \u043A \u0421\u0423\u0411\u0414 PostgreSQL (localhost - \u0442\u0435\u043A\u0443\u0449\u0438\u0439 \u041F\u041A, 5432 - \u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u044B\u0439 \u043F\u043E\u0440\u0442, m3_db - \u0438\u043C\u044F \u0431\u0430\u0437\u044B)
spring.datasource.url=jdbc:postgresql://localhost:5432/m3_db
spring.datasource.driverClassName=org.postgresql.Driver
# \u0423\u043A\u0430\u0437\u044B\u0432\u0430\u0435\u0442, \u0447\u0442\u043E \u043D\u0443\u0436\u043D\u043E \u0432\u044B\u043F\u043E\u043B\u043D\u044F\u0442\u044C \u0438\u043D\u0438\u0446\u0438\u0430\u043B\u0438\u0437\u0430\u0446\u0438\u044E \u0432\u0441\u0435\u0433\u0434\u0430 \u043F\u0440\u0438 \u0441\u0442\u0430\u0440\u0442\u0435
spring.sql.init.mode=always
# \u0415\u0441\u043B\u0438 \u0432\u044B \u0445\u043E\u0442\u0438\u0442\u0435, \u0447\u0442\u043E\u0431\u044B Spring \u043F\u0440\u043E\u0434\u043E\u043B\u0436\u0430\u043B \u0440\u0430\u0431\u043E\u0442\u0443, \u0434\u0430\u0436\u0435 \u0435\u0441\u043B\u0438 \u0432 SQL \u0435\u0441\u0442\u044C \u043E\u0448\u0438\u0431\u043A\u0438 (\u043D\u0430\u043F\u0440\u0438\u043C\u0435\u0440, \u0442\u0430\u0431\u043B\u0438\u0446\u0430 \u0443\u0436\u0435 \u0441\u043E\u0437\u0434\u0430\u043D\u0430)
spring.sql.init.continue-on-error=true
# \u0412\u043A\u043B\u044E\u0447\u0435\u043D\u0438\u0435 \u0432\u044B\u0432\u043E\u0434\u0430 \u0441\u0433\u0435\u043D\u0435\u0440\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0445 SQL-\u0437\u0430\u043F\u0440\u043E\u0441\u043E\u0432 \u0432 \u043A\u043E\u043D\u0441\u043E\u043B\u044C IDEA \u0434\u043B\u044F \u0430\u043D\u0430\u043B\u0438\u0437\u0430 \u0440\u0430\u0431\u043E\u0442\u044B \u0431\u0430\u0437\u044B \u0434\u0430\u043D\u043D\u044B\u0445
spring.jpa.show-sql=true
spring.jpa.open-in-view=true
# \u041E\u0442\u043A\u043B\u044E\u0447\u0430\u0435\u043C \u0430\u0432\u0442\u043E\u043C\u0430\u0442\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u0441\u043E\u0437\u0434\u0430\u043D\u0438\u0435 \u0442\u0430\u0431\u043B\u0438\u0446 Hibernate, \u0442\u0430\u043A \u043A\u0430\u043A \u043C\u044B \u0441\u0434\u0435\u043B\u0430\u043B\u0438 \u044D\u0442\u043E \u0441\u0430\u043C\u0438
spring.jpa.hibernate.ddl-auto=none
#Spring \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0438\u0432\u0430\u0435\u0442 \u0440\u0430\u0437\u043C\u0435\u0440 \u0444\u0430\u0439\u043B\u0430(\u043E\u0431\u044B\u0447\u043D\u043E 1\u041C\u0431), \u0443\u0432\u0435\u043B\u0438\u0447\u0435\u043D\u0438\u0435 \u0440\u0430\u0437\u043C\u0435\u0440\u0430
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
## \u041F\u0443\u0442\u044C \u043A \u043F\u0430\u043F\u043A\u0435, \u0433\u0434\u0435 \u0431\u0443\u0434\u0443\u0442 \u043B\u0435\u0436\u0430\u0442\u044C \u0444\u0430\u0439\u043B\u044B
#file.upload-dir=uploads
# application.properties
app.file.storage-location=uploads/files
spring.thymeleaf.cache=false